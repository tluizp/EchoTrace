spring:
  datasource:
    url: ${ECHOTRACE_DB_URL:jdbc:postgresql://localhost:5432/echotrace}
    username: ${ECHOTRACE_DB_USERNAME:postgres}
    password: ${ECHOTRACE_DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    baseline-on-migrate: true
    baseline-version: 1

echotrace:
  business-slos: []
